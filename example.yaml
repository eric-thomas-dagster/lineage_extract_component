# ════════════════════════════════════════════════════════════════════
# Example: Alation (code location scope)
# ════════════════════════════════════════════════════════════════════
type: your_project.components.catalog_lineage_sync.CatalogLineageSync

attributes:
  demo_mode: true
  scope: code_location
  catalog_target: alation
  catalog_url: "https://alation.internal/integration/v2"
  api_token_env: "ALATION_API_TOKEN"
  demo_export_path: "data/exports/alation_lineage.json"
  sensor_interval_seconds: 3600
  sensor_name: alation_lineage_sync
  sensor_default_status: STOPPED

